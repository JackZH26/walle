<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇩🇪 Vokabel-Matching</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f23; color: #e0e0e0;
  }
  body {
    display: flex; flex-direction: column;
    padding: 8px 12px; max-width: 800px; margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 0; flex-shrink: 0;
  }
  .header h1 { font-size: 1.1em; color: #fff; }
  .header .date { color: #666; font-size: 0.75em; }

  /* Progress bar */
  .progress-bar {
    width: 100%; height: 4px; background: #1a1a3e;
    border-radius: 2px; margin: 4px 0; flex-shrink: 0; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A);
    border-radius: 2px; transition: width 0.4s ease;
  }

  /* Stats */
  .stats-bar {
    display: flex; gap: 16px; font-size: 0.78em; color: #aaa;
    padding: 2px 0; flex-shrink: 0;
  }
  .stats-bar span { display: flex; align-items: center; gap: 4px; }
  .stats-bar .correct { color: #4CAF50; }
  .stats-bar .wrong { color: #f44336; }

  /* Column headers */
  .col-headers {
    display: flex; gap: 8px; padding: 6px 0 2px;
    flex-shrink: 0;
  }
  .col-headers div {
    flex: 1; text-align: center; font-size: 0.72em; font-weight: 600;
    color: #555; text-transform: uppercase; letter-spacing: 1.5px;
  }

  /* Game grid - the main area that fills remaining space */
  .game-grid {
    flex: 1; display: flex; gap: 8px;
    min-height: 0; /* crucial for flex shrink */
  }
  .column {
    flex: 1; display: flex; flex-direction: column;
    gap: 4px; justify-content: center;
  }

  /* Word buttons - sized to fill available space */
  .word-btn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    border: 2px solid #2a2a5e; border-radius: 8px;
    background: #1a1a3e; color: #e0e0e0;
    font-size: clamp(1em, 3.2vmin, 1.35em);
    cursor: pointer; transition: all 0.15s ease; text-align: center;
    user-select: none; -webkit-user-select: none;
    padding: 2px 6px;
    min-height: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .word-btn:hover:not(.matched):not(.disabled) {
    border-color: #5c6bc0; background: #252560;
  }
  .word-btn.selected {
    border-color: #7c4dff; background: #2d2070; color: #fff;
    box-shadow: 0 0 10px rgba(124, 77, 255, 0.3);
  }
  .word-btn.matched {
    border-color: #4CAF50; background: #1b3a1b; color: #4CAF50;
    cursor: default; opacity: 0.6;
  }
  .word-btn.wrong-flash {
    animation: wrongShake 0.4s ease;
    border-color: #f44336; background: #3a1b1b;
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    50% { transform: translateX(4px); }
    75% { transform: translateX(-3px); }
  }

  /* Result screen */
  .result-screen {
    display: none; flex-direction: column; align-items: center;
    flex: 1; overflow-y: auto; padding: 8px 0;
  }
  .result-screen h2 { font-size: 1.4em; color: #fff; margin-bottom: 8px; }
  .result-score {
    font-size: 2.4em; font-weight: 700; margin: 8px 0;
    background: linear-gradient(135deg, #4CAF50, #8BC34A);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .result-time { color: #888; font-size: 0.85em; margin-bottom: 12px; }
  .result-details { width: 100%; max-width: 500px; }
  .result-details .item {
    display: flex; justify-content: space-between; padding: 5px 8px;
    border-bottom: 1px solid #1a1a3e; font-size: 0.85em;
  }
  .result-details .item.wrong-item { color: #f44336; }
  .result-details .item.correct-item { color: #4CAF50; }
  .weak-words {
    margin-top: 12px; padding: 12px; background: #1a1a3e;
    border-radius: 10px; text-align: left; width: 100%; max-width: 500px;
  }
  .weak-words h3 { color: #f44336; margin-bottom: 6px; font-size: 0.9em; }
  .weak-words li { padding: 3px 0; font-size: 0.85em; color: #ccc; list-style: none; }
  .weak-words li span { color: #888; }
  .btn-primary {
    padding: 10px 24px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #4CAF50, #66BB6A);
    color: #fff; font-size: 0.95em; cursor: pointer; margin-top: 12px;
  }

  /* Desktop: slightly more breathing room */
  @media (min-height: 700px) {
    body { padding: 12px 16px; }
    .word-btn { font-size: clamp(1.05em, 3.2vmin, 1.35em); border-radius: 10px; padding: 4px 10px; }
    .column { gap: 6px; }
    .game-grid { gap: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🇩🇪 Vokabel-Matching</h1>
  <span class="date" id="dateLabel"></span>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="stats-bar">
  <span>📄 <strong id="pageNum">1</strong>/<strong id="pageTotal">3</strong></span>
  <span class="correct">✅ <strong id="correctCount">0</strong></span>
  <span class="wrong">❌ <strong id="wrongCount">0</strong></span>
  <span>⏱ <strong id="timerDisplay">0:00</strong></span>
</div>

<div class="col-headers" id="colHeaders">
  <div>🇩🇪 Deutsch</div>
  <div>🇬🇧 English</div>
</div>

<div class="game-grid" id="gameArea">
  <div class="column" id="leftCol"></div>
  <div class="column" id="rightCol"></div>
</div>

<div class="result-screen" id="resultScreen">
  <h2>🎉 Fertig!</h2>
  <div class="result-score" id="resultScore"></div>
  <div class="result-time" id="resultTime"></div>
  <div class="result-details" id="resultDetails"></div>
  <div class="weak-words" id="weakWords" style="display:none;">
    <h3>📝 生词本新增</h3>
    <ul id="weakList"></ul>
  </div>
  <button class="btn-primary" onclick="sendResults()">📤 发送结果到 Discord</button>
</div>

<script>
// 2026-03-13 Fri: Spiele & Unterhaltung + Review weak words
const DAILY_WORDS = {
  date: "2026-03-13",
  pages: [
    // Page 1: 6 weak words (3/9 batch) + 4 new Spiele words
    [
      { de: "die Erfahrung", en: "experience" },
      { de: "eigentlich", en: "actually" },
      { de: "versuchen", en: "to try" },
      { de: "die Besprechung", en: "meeting" },
      { de: "sich entscheiden", en: "to decide" },
      { de: "der Unterschied", en: "difference" },
      { de: "der Spielstand", en: "score / save state" },
      { de: "die Herausforderung", en: "challenge" },
      { de: "die Spielmechanik", en: "game mechanics" },
      { de: "steuern", en: "to control / steer" },
    ],
    // Page 2: 5 weak words (3/10 batch) + 5 new Spiele words
    [
      { de: "die Entwicklung", en: "development" },
      { de: "herunterladen", en: "to download" },
      { de: "speichern", en: "to save" },
      { de: "die Fehlermeldung", en: "error message" },
      { de: "veröffentlichen", en: "to publish" },
      { de: "der Gegner", en: "opponent" },
      { de: "die Belohnung", en: "reward" },
      { de: "freischalten", en: "to unlock" },
      { de: "der Durchgang", en: "round / run" },
      { de: "unterhaltsam", en: "entertaining" },
    ],
    // Page 3: All new A2-B1 Unterhaltung words
    [
      { de: "die Handlung", en: "plot / storyline" },
      { de: "spannend", en: "exciting / thrilling" },
      { de: "enttäuschend", en: "disappointing" },
      { de: "die Empfehlung", en: "recommendation" },
      { de: "der Zuschauer", en: "spectator / viewer" },
      { de: "sich lohnen", en: "to be worth it" },
      { de: "die Bewertung", en: "rating / review" },
      { de: "begeistert", en: "enthusiastic" },
      { de: "scheitern", en: "to fail" },
      { de: "die Entscheidung", en: "decision" },
    ],
  ]
};

let currentPage = 0, selected = null;
let totalCorrect = 0, totalWrong = 0, matchedThisPage = 0;
let allResults = [], pairAttempts = {};
let startTime = Date.now(), timerInterval;

function init() {
  document.getElementById('dateLabel').textContent = DAILY_WORDS.date;
  document.getElementById('pageTotal').textContent = DAILY_WORDS.pages.length;
  timerInterval = setInterval(updateTimer, 1000);
  loadPage(0);
}

function updateTimer() {
  const s = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('timerDisplay').textContent = `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}

function shuffle(a) {
  a = [...a];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function loadPage(pi) {
  currentPage = pi; matchedThisPage = 0; selected = null; pairAttempts = {};
  const pairs = DAILY_WORDS.pages[pi];
  const deS = shuffle(pairs.map((p,i) => ({text:p.de, idx:i})));
  const enS = shuffle(pairs.map((p,i) => ({text:p.en, idx:i})));
  document.getElementById('pageNum').textContent = pi + 1;
  updateProgress();
  const lc = document.getElementById('leftCol'), rc = document.getElementById('rightCol');
  lc.innerHTML = ''; rc.innerHTML = '';
  deS.forEach(item => lc.appendChild(mkBtn(item.text, 'de', item.idx)));
  enS.forEach(item => rc.appendChild(mkBtn(item.text, 'en', item.idx)));
}

function mkBtn(text, side, idx) {
  const b = document.createElement('div');
  b.className = 'word-btn'; b.textContent = text;
  b.dataset.side = side; b.dataset.idx = idx;
  b.addEventListener('click', () => onClick(b, side, idx));
  return b;
}

function onClick(btn, side, idx) {
  if (btn.classList.contains('matched')) return;
  if (!selected) { btn.classList.add('selected'); selected = {side,index:idx,element:btn}; return; }
  if (selected.element === btn) { btn.classList.remove('selected'); selected = null; return; }
  if (selected.side === side) { selected.element.classList.remove('selected'); btn.classList.add('selected'); selected={side,index:idx,element:btn}; return; }

  const deIdx = side==='de'? idx : selected.index;
  const enIdx = side==='en'? idx : selected.index;
  const deBtn = side==='de'? btn : selected.element;
  const enBtn = side==='en'? btn : selected.element;
  const pk = `${currentPage}-${deIdx}`;
  if (!pairAttempts[pk]) pairAttempts[pk] = 0;

  if (deIdx === enIdx) {
    deBtn.classList.remove('selected'); deBtn.classList.add('matched'); enBtn.classList.add('matched');
    matchedThisPage++; totalCorrect++;
    document.getElementById('correctCount').textContent = totalCorrect;
    const pair = DAILY_WORDS.pages[currentPage][deIdx];
    allResults.push({de:pair.de, en:pair.en, correct:pairAttempts[pk]===0, attempts:pairAttempts[pk]+1});
    selected = null; updateProgress();
    if (matchedThisPage === DAILY_WORDS.pages[currentPage].length) {
      setTimeout(() => {
        if (currentPage < DAILY_WORDS.pages.length - 1) loadPage(currentPage + 1);
        else showResults();
      }, 500);
    }
  } else {
    pairAttempts[pk]++; totalWrong++;
    document.getElementById('wrongCount').textContent = totalWrong;
    deBtn.classList.add('wrong-flash'); enBtn.classList.add('wrong-flash');
    selected.element.classList.remove('selected');
    setTimeout(() => { deBtn.classList.remove('wrong-flash'); enBtn.classList.remove('wrong-flash'); }, 400);
    selected = null;
  }
}

function updateProgress() {
  const total = DAILY_WORDS.pages.reduce((s,p) => s+p.length, 0);
  document.getElementById('progressFill').style.width = (allResults.length/total*100) + '%';
}

function showResults() {
  clearInterval(timerInterval);
  const s = Math.floor((Date.now()-startTime)/1000);
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('colHeaders').style.display = 'none';
  document.querySelector('.stats-bar').style.display = 'none';
  document.querySelector('.progress-bar').style.display = 'none';
  const scr = document.getElementById('resultScreen');
  scr.style.display = 'flex';
  const fc = allResults.filter(r=>r.correct).length, tot = allResults.length;
  const pct = Math.round(fc/tot*100);
  document.getElementById('resultScore').textContent = `${pct}% (${fc}/${tot})`;
  document.getElementById('resultTime').textContent = `⏱ ${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')} · ❌ ${totalWrong}`;
  const det = document.getElementById('resultDetails'); det.innerHTML = '';
  allResults.forEach(r => {
    const d = document.createElement('div');
    d.className = 'item '+(r.correct?'correct-item':'wrong-item');
    d.innerHTML = `<span>${r.de}</span><span>${r.en} ${r.correct?'✅':'❌('+r.attempts+')'}</span>`;
    det.appendChild(d);
  });
  const weak = allResults.filter(r=>!r.correct);
  if (weak.length) {
    document.getElementById('weakWords').style.display = 'block';
    const ul = document.getElementById('weakList'); ul.innerHTML = '';
    weak.forEach(w => { const li=document.createElement('li'); li.innerHTML=`<strong>${w.de}</strong> <span>→ ${w.en}</span>`; ul.appendChild(li); });
  }
  window.__matchingResults = { date:DAILY_WORDS.date, score:pct, correct:fc, total:tot, wrongCount:totalWrong, timeSeconds:s,
    weak:weak.map(r=>({de:r.de,en:r.en})), passed:allResults.filter(r=>r.correct).map(r=>({de:r.de,en:r.en})) };
}

function sendResults() {
  const btn = event.target;
  btn.textContent = '✅ 已保存！瓦力会同步到 Discord';
  btn.disabled = true; btn.style.opacity = '0.6';
}

init();
</script>
</body>
</html>
